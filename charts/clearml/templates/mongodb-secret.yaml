{{- if and (.Values.mckMongodb.enabled) (.Values.mckMongodb.community.createResource) }}

{{- $secretName := (index .Values.mckMongodb.community.resource.users 0).passwordSecretRef.name -}}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- $password := "" -}}
{{- if and $existing $existing.data.password -}}
{{- $password = ($existing.data.password | b64dec) -}}
{{- else -}}
{{- $password = (randAlphaNum 16) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ (index .Values.mckMongodb.community.resource.users 0).passwordSecretRef.name }}
type: Opaque
stringData:
  password: {{ $password | quote }}
  connectionString: {{ printf "%s%s%s%s%s" "mongodb://" (index .Values.mckMongodb.community.resource.users 0).name ":" $password "@mongodb-replica-set-svc" }}
{{- end }}
