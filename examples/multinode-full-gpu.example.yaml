# 整卡多机队列（要求节点暴露整卡 nvidia.com/gpu）
#
# ⚠️ 先自检：kubectl get nodes -o json | jq -r '.items[] |
#      "\(.metadata.name) nvidia.com/gpu=\(.status.allocatable["nvidia.com/gpu"])"'
#    若 nvidia.com/gpu=0（HAMi/vGPU-only 集群），本文件用不了 ——
#    请改用 values-multinode-vgpu.standalone.example.yaml + volcano_queue_multinode_vgpu.example.yaml
#    （整卡 = 静态 volcano.sh/vgpu-cores:100 + 整卡显存）。详见 MULTINODE_schemes_zh.md §0.4。

clearml:
  existingAgentk8sglueSecret: "clearml-agent-creds"

agentk8sglue:
  queue: multinode-full-gpu
  # 旧版 k8s-glue（如 agent-k8s-base:1.24-21）不支持 --create-queue CLI；
  # 须 false，并在 ClearML WebUI / API 手动建同名队列（见 MULTINODE_schemes_zh.md §1.3）
  createQueueIfNotExists: false
  defaultContainerImage: nvidia/cuda:12.4.1-runtime-ubuntu22.04

  vgpuHook:
    enabled: false

  extraEnvs:
    - name: "CLEARML_AGENT_NO_UPDATE"
      value: "true"

  basePodTemplate:
    schedulerName: volcano

    runtimeClassName: nvidia
    resources:
      limits:
        nvidia.com/gpu: "1"
      requests:
        cpu: "8"
        memory: 32Gi
        nvidia.com/gpu: "1"

    env:
      # 方案 1: launch_multi_node 读此变量作为 master_addr
      - name: CLEARML_MULTI_NODE_MASTER_DEF_ADDR
        valueFrom:
          fieldRef:
            fieldPath: status.podIP

    nodeSelector:
      gpu.present: "true"

    volumes:
      - name: clearml-cache
        hostPath:
          path: /data/clearml-cache
          type: DirectoryOrCreate
    volumeMounts:
      - name: clearml-cache
        mountPath: /root/.clearml
